name: Setup
description: Install pnpm + Node (pinned) and run a frozen-lockfile install.

inputs:
  registry-url:
    description: npm registry URL. Set it on the release job so NODE_AUTH_TOKEN takes effect.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22.22.3'
        registry-url: ${{ inputs.registry-url }}
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      env:
        PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'

    - name: Persist supply-chain policy relaxation
      run: echo "PNPM_CONFIG_MINIMUM_RELEASE_AGE=0" >> "$GITHUB_ENV"
      shell: bash
